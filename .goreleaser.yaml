version: 2

project_name: hippocamp

before:
  hooks:
    - go mod tidy

builds:
  - id: hippocamp-darwin
    main: ./cmd/hippocamp
    binary: hippocamp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.buildTime={{.Date}}
    hooks:
      post:
        - cmd: 'codesign --sign "Developer ID Application: Ruslan Korennoy (4JV3A5SUSZ)" --options runtime --timestamp "{{ .Path }}"'

  - id: hippocamp-other
    main: ./cmd/hippocamp
    binary: hippocamp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.buildTime={{.Date}}

archives:
  - id: hippocamp
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - config.yaml

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: hippocamp
    binary: "hippocamp"
    repository:
      owner: tggo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/tggo/hippocamp"
    description: "RDF MCP server — expose an in-memory knowledge graph to LLMs via triple/sparql/graph tools"
    license: "MIT"
    skip_upload: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
